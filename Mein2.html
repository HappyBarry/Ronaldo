<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info</title>
</head>
<body>
  <h1 style="color: chocolate;" >Willkommen <br>국정원 지하실</h1>
  <img src="images/노날두.jpeg" alt="siuu" width="10%">
  <form action="">
    <fieldset>
      <legend>Produckt auswählen</legend>

      <p id="product" style="color: magenta;">Wählen Sie etwas aus.</p>

      <p>
        <input type="checkbox" value="b"><label>노무현 지하실 방번호 선택</label>
        <input type="number" min="0" max="523" value="1">(Maximal 523)
      </p>

      <p>
        <input type="checkbox" value="c"><label>Magst du 노무현?</label>
        <br>(Nein)<input type="range" min="0" max="3" value="1">(Ja)
      </p>
      <p>Starten die Musik</p>
      <body>
        <audio src="images/city.mp3" controls autoplay></audio>
      </body>
    </fieldset>

    <fieldset>
      <legend>퀴즈</legend>
      <ul>
        <li>
          <label for="user-name">노무현을 민 사람은?</label>
          <input type="text" id="user-name" size="20" required placeholder="이름 적어라 이기야">
        </li>
      </ul>
    </fieldset>
  </form>
</body>
</html>
